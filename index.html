<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Kod ve Sipariş Yönetimi</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome İkonları -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- QR Kod Kütüphanesi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Başlık -->
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent mb-2">
                <i class="fa-solid fa-qrcode mr-2"></i>QR Kod Sipariş Sistemi
            </h1>
            <p class="text-slate-400">Masalarınızı yönetin, anlık siparişleri takip edin.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Sol Panel: Masa Ekleme ve QR Üretme -->
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card rounded-2xl p-6 shadow-xl">
                    <h2 class="text-xl font-bold mb-4 flex items-center text-blue-400">
                        <i class="fa-solid fa-plus-circle mr-2"></i>Yeni Masa Tanımla
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-300 mb-1">Masa Adı / Numarası</label>
                            <input type="text" id="tableName" placeholder="Örn: Masa 5, Teras 2" 
                                class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-colors">
                        </div>
                        <button onclick="generateTable()" 
                            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-blue-600/20 transition-all flex items-center justify-center gap-2 cursor-pointer">
                            <i class="fa-solid fa-wand-magic-sparkles"></i> QR Kod Oluştur
                        </button>
                    </div>
                </div>

                <!-- QR Önizleme Alanı (Gizli başlar) -->
                <div id="qrPreviewCard" class="glass-card rounded-2xl p-6 shadow-xl hidden text-center">
                    <h3 id="previewTitle" class="text-lg font-bold mb-4 text-slate-200"></h3>
                    <div class="bg-white p-4 rounded-xl inline-block mb-4 shadow-inner">
                        <div id="qrcode"></div>
                    </div>
                    <button onclick="downloadQR()" 
                        class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2.5 px-4 rounded-xl transition-all flex items-center justify-center gap-2 cursor-pointer">
                        <i class="fa-solid fa-download"></i> QR Kodu İndir
                    </button>
                </div>
            </div>

            <!-- Sağ Panel: Canlı Sipariş Takip Ekranı -->
            <div class="lg:col-span-2">
                <div class="glass-card rounded-2xl p-6 shadow-xl min-h-[500px]">
                    <div class="flex items-center justify-between mb-6 border-b border-slate-700/50 pb-4">
                        <h2 class="text-xl font-bold flex items-center text-indigo-400">
                            <i class="fa-solid fa-bell animate-pulse mr-2"></i>Canlı Sipariş Paneli
                        </h2>
                        <span id="orderCount" class="bg-indigo-500/20 text-indigo-300 text-xs font-bold px-3 py-1 rounded-full border border-indigo-500/30">
                            0 Aktif Sipariş
                        </span>
                    </div>

                    <!-- Sipariş Kartları Listesi -->
                    <div id="ordersContainer" class="space-y-4">
                        <!-- Boş Durum Bildirimi -->
                        <div id="emptyState" class="text-center py-20 text-slate-500">
                            <i class="fa-solid fa-tray mb-4 text-5xl text-slate-600"></i>
                            <p class="text-lg">Henüz gelen bir sipariş yok.</p>
                            <p class="text-sm text-slate-600 mt-1">Masalardan QR tarandığında burada listelenecektir.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bildirim Sesi -->
    <audio id="notificationSound" src="https://assets.mixkit.co/active_storage/sfx/911/911-word.wav" preload="auto"></audio>

    <script>
        let currentQrDataUrl = '';

        // Masa için QR Kod Üretme Fonksiyonu
        function generateTable() {
            const nameInput = document.getElementById('tableName');
            const tableName = nameInput.value.trim();

            if (!tableName) {
                alert('Lütfen geçerli bir masa adı veya numarası girin!');
                return;
            }

            // QR kod içeriğini ayarla (Masa bilgisi barındıran simüle link)
            const qrContent = `https://menu.restoraniniz.com/?masa=${encodeURIComponent(tableName)}`;
            
            // Temizleme ve Yeniden Oluşturma
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            
            new QRCode(qrContainer, {
                text: qrContent,
                width: 200,
                height: 200,
                colorDark: "#0f172a",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            // Kartı Görünür Yap ve Başlığı Güncelle
            document.getElementById('previewTitle').innerText = `${tableName} - QR Kodu`;
            document.getElementById('qrPreviewCard').classList.remove('hidden');

            // İndirme linki için kısa bir gecikmeyle data URL yakala
            setTimeout(() => {
                const img = qrContainer.querySelector('img');
                if (img) currentQrDataUrl = img.src;
            }, 100);

            nameInput.value = ''; // Girişi temizle
        }

        // Resmi Bilgisayara/Telefona İndirme
        function downloadQR() {
            if (!currentQrDataUrl) return;
            const link = document.createElement('a');
            link.download = `QR_Kod.png`;
            link.href = currentQrDataUrl;
            link.click();
        }
    </script>
</body>
</html>
